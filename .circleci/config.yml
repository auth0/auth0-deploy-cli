version: 2.1

orbs:
  codecov: codecov/codecov@3

commands:
  install_pnpm:
    description: Install pnpm via corepack and configure store directory
    steps:
      - run:
          name: Install pnpm package manager
          command: |
            sudo npm install --global corepack@latest
            sudo corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

jobs:
  e2e_test_as_node_module:
    docker:
      - image: cimg/node:22.12.0
    working_directory: ~/repo
    steps:
      - checkout
      - install_pnpm
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install Dependencies
          command: pnpm install
      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run: AUTH0_HTTP_RECORDINGS="lockdown" pnpm run test:e2e:node-module

  e2e_test_as_cli:
    docker:
      - image: cimg/node:22.12.0
    working_directory: ~/repo
    steps:
      - checkout
      - install_pnpm
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install Dependencies
          command: pnpm install
      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run: pnpm run test:e2e:cli

  unit_test:
    parameters:
      v:
        type: string
        default: "lts"
    docker:
      - image: cimg/node:<< parameters.v >>
    working_directory: ~/repo
    steps:
      - checkout
      - install_pnpm
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - v<< parameters.v >>-pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - v<< parameters.v >>-pnpm-packages-
      - run:
          name: Install Dependencies
          command: pnpm install
      - save_cache:
          name: Save pnpm Package Cache
          key: v<< parameters.v >>-pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run: pnpm run lint
      - run: pnpm run test:coverage
      - persist_to_workspace:
          root: ~/repo
          paths: .
      - codecov/upload

  deploy:
    parameters:
      v:
        type: string
        default: "lts"
    docker:
      - image: cimg/node:<< parameters.v >>
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: ~/repo
      - install_pnpm
      - run:
          name: Authenticate with registry
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/repo/.npmrc
      - run:
          name: Publish package
          command: pnpm publish --no-git-checks

  deploy_beta:
    parameters:
      v:
        type: string
        default: "lts"
    docker:
      - image: cimg/node:<< parameters.v >>
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: ~/repo
      - install_pnpm
      - run:
          name: Authenticate with registry
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/repo/.npmrc
      - run:
          name: Publish beta package
          command: pnpm publish --tag beta --no-git-checks

  does_typescript_compile:
    docker:
      - image: cimg/node:22.12.0
    working_directory: ~/repo
    steps:
      - checkout
      - install_pnpm
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install Dependencies
          command: pnpm install
      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run: npx tsc --noEmit

  does_lint_pass:
    docker:
      - image: cimg/node:22.12.0
    working_directory: ~/repo
    steps:
      - checkout
      - install_pnpm
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install Dependencies
          command: pnpm install
      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run: pnpm run lint

workflows:
  version: 2

  e2e_test:
    jobs:
      - e2e_test_as_node_module:
          name: E2E tests as Node module
      - e2e_test_as_cli:
          name: E2E tests as CLI
          filters:
            branches:
              only: master

  unit_test:
    jobs:
      - does_typescript_compile:
          name: Does Typescript compile?
      - does_lint_pass:
          name: Does lint pass?
      - unit_test:
          name: Unit tests with Node LTS
          v: "lts"
      - unit_test:
          name: Unit tests with Node current
          v: "22.12.0"

  test_and_deploy:
    jobs:
      - unit_test:
          name: Unit tests with Node LTS
          v: "lts"
          filters:
            branches:
              only: master
            tags:
              only: /^v.*/
      - deploy:
          name: Publish to NPM
          v: "lts"
          requires:
            - Unit tests with Node LTS
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
          context:
            - publish-npm

  test_and_deploy_beta:
    jobs:
      - unit_test:
          name: Unit tests with Node LTS (Beta)
          v: "lts"
          filters:
            branches:
              only: beta
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$/
      - deploy_beta:
          name: Publish Beta to NPM
          v: "lts"
          requires:
            - Unit tests with Node LTS (Beta)
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$/
          context:
            - publish-npm
